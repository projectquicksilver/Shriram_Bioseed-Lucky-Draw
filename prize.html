
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shriram Bioseed – Prize Detail & Spin</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Barlow+Condensed:wght@700;800;900&family=Nunito:wght@600;700;800;900&family=Teko:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:    #D4A017;
  --gold-lt: #FFD966;
  --gold-dk: #8B6000;
  --maroon:  #7B0D0D;
  --cream:   #FFF5DC;
  --dark:    #1A0800;
  --brown:   #3B1200;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--dark);
}

/* ═══ BACKGROUND ═══ */
.hero {
  position: relative;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 100% 80% at 50% 20%,
    #7B2A00 0%, #3B1200 35%, #1A0800 70%, #0D0400 100%);
}
.hero-bg::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(105deg, transparent 0px, transparent 18px, rgba(212,160,23,0.04) 18px, rgba(212,160,23,0.04) 19px),
    repeating-linear-gradient(75deg, transparent 0px, transparent 24px, rgba(212,160,23,0.03) 24px, rgba(212,160,23,0.03) 25px);
}
.hero-bg::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
}

/* Rotating gold rays */
.rays { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
.rays::before {
  content: ''; position: absolute;
  top: 0; left: 50%; width: 280%; height: 280%;
  transform: translate(-50%, -30%);
  background: conic-gradient(
    from 0deg,
    transparent 0deg, rgba(212,160,23,0.06) 3deg, transparent 6deg,
    transparent 22deg, rgba(212,160,23,0.04) 25deg, transparent 28deg,
    transparent 44deg, rgba(212,160,23,0.06) 47deg, transparent 50deg,
    transparent 66deg, rgba(212,160,23,0.04) 69deg, transparent 72deg,
    transparent 88deg, rgba(212,160,23,0.06) 91deg, transparent 94deg,
    transparent 110deg, rgba(212,160,23,0.04) 113deg, transparent 116deg,
    transparent 132deg, rgba(212,160,23,0.06) 135deg, transparent 138deg,
    transparent 154deg, rgba(212,160,23,0.04) 157deg, transparent 160deg,
    transparent 176deg, rgba(212,160,23,0.06) 179deg, transparent 182deg,
    transparent 198deg, rgba(212,160,23,0.04) 201deg, transparent 204deg,
    transparent 220deg, rgba(212,160,23,0.06) 223deg, transparent 226deg,
    transparent 242deg, rgba(212,160,23,0.04) 245deg, transparent 248deg,
    transparent 264deg, rgba(212,160,23,0.06) 267deg, transparent 270deg,
    transparent 286deg, rgba(212,160,23,0.04) 289deg, transparent 292deg,
    transparent 308deg, rgba(212,160,23,0.06) 311deg, transparent 314deg,
    transparent 330deg, rgba(212,160,23,0.04) 333deg, transparent 336deg,
    transparent 352deg, rgba(212,160,23,0.06) 355deg, transparent 358deg,
    transparent 360deg
  );
  animation: spinRays 80s linear infinite;
}
@keyframes spinRays { to { transform: translate(-50%,-30%) rotate(360deg); } }

.fx { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.cf { position: absolute; top:-20px; animation: cfFall linear infinite; opacity:0; }
@keyframes cfFall {
  0%   { transform:translateY(-30px) rotate(0deg); opacity:0; }
  8%   { opacity:1; }
  92%  { opacity:0.7; }
  100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
}
.sp {
  position: absolute;
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  background: var(--gold-lt);
  animation: twk ease-in-out infinite;
}
@keyframes twk {
  0%,100% { opacity:0.1; transform:scale(0.6) rotate(0deg); }
  50%      { opacity:1;   transform:scale(1.6) rotate(20deg); }
}

/* ═══ HOME BUTTON ═══ */
.home-btn {
  position: fixed; top: 14px; left: 14px;
  z-index: 200;
  display: flex; align-items: center; gap: 7px;
  background: rgba(26,8,0,0.85);
  border: 1.5px solid rgba(212,160,23,0.45);
  border-radius: 50px;
  padding: 8px 18px 8px 12px;
  color: var(--gold-lt);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 900; letter-spacing: 1.5px;
  text-decoration: none;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: all 0.22s ease;
}
.home-btn:hover {
  background: rgba(212,160,23,0.15);
  border-color: var(--gold);
  transform: translateX(-3px);
  box-shadow: 0 6px 28px rgba(212,160,23,0.3);
}
.home-btn svg { width: 16px; height: 16px; fill: var(--gold-lt); }

/* ═══ CONTENT ═══ */
.content {
  position: relative; z-index: 10;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 14px;
}

/* ═══ HEADER LOGOS ═══ */
.header-logos {
  width: 100%; max-width: 860px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.logo-left, .logo-right {
  height: clamp(40px,6vw,60px);
  object-fit: contain;
  filter: drop-shadow(0 2px 10px rgba(212,160,23,0.55));
  animation: logoPulse 3.5s ease-in-out infinite;
}
.logo-right { animation-delay: 1s; }
@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 2px 10px rgba(212,160,23,0.4)); }
  50%      { filter: drop-shadow(0 2px 24px rgba(212,160,23,0.9)) drop-shadow(0 0 44px rgba(212,160,23,0.4)); }
}

/* ═══ PODIUM (single prize) ═══ */
.podium-single {
  display: flex; flex-direction: column; align-items: center;
  position: relative; flex-shrink: 0;
}
.podium-single::after {
  content: ''; position: absolute; bottom: -4px;
  width: 120%; height: 22px; border-radius: 50%; filter: blur(14px);
  background: radial-gradient(ellipse, rgba(212,160,23,0.65) 0%, transparent 70%);
}

.p-product-wrap {
  position: relative;
  display: inline-flex; align-items: flex-end; justify-content: center;
}
.p-badge {
  position: absolute; top: -10px; left: -14px; z-index: 5;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7));
  animation: badgeBounce 2.8s ease-in-out infinite;
  width: clamp(40px,5.5vw,64px);
}
@keyframes badgeBounce {
  0%,100% { transform: rotate(-8deg) scale(1); }
  50%      { transform: rotate(-3deg) scale(1.14); }
}
.p-product {
  object-fit: contain;
  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.75));
  animation: floatUp 3.5s ease-in-out infinite;
  margin-bottom: -5px; position: relative; z-index: 2;
  width: clamp(90px,14vw,155px);
}
@keyframes floatUp {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-14px); }
}
.p-disc {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #D4A017 0%, #7A5500 100%);
  border-radius: 6px 6px 0 0;
  box-shadow: 0 4px 16px rgba(212,160,23,0.5), inset 0 1px 0 rgba(255,220,100,0.4);
  width: clamp(100px,14vw,168px); height: clamp(22px,3.8vw,46px);
}
#pod-disc-mega  { background: linear-gradient(180deg,#FF6B00 0%,#8B2200 100%); box-shadow:0 4px 16px rgba(255,80,0,0.5),inset 0 1px 0 rgba(255,160,80,0.4); }
#pod-disc-rank2 { background: linear-gradient(180deg,#A0B4C8 0%,#4A6070 100%); box-shadow:0 4px 14px rgba(120,160,200,0.4),inset 0 1px 0 rgba(200,220,240,0.3); }
#pod-disc-rank3 { background: linear-gradient(180deg,#C08840 0%,#6B4A20 100%); box-shadow:0 4px 14px rgba(180,130,60,0.4),inset 0 1px 0 rgba(220,170,100,0.3); }
#pod-disc-rankc { background: linear-gradient(180deg,#5A9060 0%,#2A5030 100%); box-shadow:0 4px 14px rgba(80,150,80,0.4),inset 0 1px 0 rgba(120,200,130,0.3); }

.p-rank-label {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:clamp(9px,1.4vw,15px); letter-spacing:1.5px;
  color:#FFF5C0; white-space:nowrap; text-shadow:0 1px 0 rgba(0,0,0,0.5);
}
.p-pill {
  margin-top:6px;
  background:linear-gradient(135deg,rgba(50,20,0,0.92),rgba(26,8,0,0.96));
  border-radius:40px; padding:4px 18px; text-align:center;
  border:1.5px solid rgba(212,160,23,0.5);
}
.p-pill strong {
  display:block; font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:clamp(9px,1.3vw,14px); line-height:1.2; color:var(--gold-lt);
}
.p-pill span { font-size:clamp(8px,1vw,10px); color:rgba(255,255,255,0.45); font-weight:700; }

/* ═══ DIVIDER ═══ */
.divider {
  display:flex; align-items:center;
  width:100%; max-width:600px;
  gap:10px; flex-shrink:0;
}
.div-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(212,160,23,0.45),transparent); }
.div-txt {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:900;
  letter-spacing:3px; color:rgba(255,210,100,0.5); text-transform:uppercase; white-space:nowrap;
}

/* ═══ CARD / WHEEL ZONE ═══ */
.card-zone {
  position: relative;
  width: 100%; max-width: 320px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  min-height: clamp(190px, 27vh, 270px);
}

/* ── PRIZE CARD ── */
.pcard-wrap {
  width: 100%; max-width: 285px;
  position:relative; border-radius:20px;
  cursor: pointer;
}
.pcard-wrap::before {
  content:''; position:absolute; inset:-2px; border-radius:21px;
  background: conic-gradient(from 0deg, #D4A017 0%, #FF8F00 25%, #D4A017 50%, #FF6B00 75%, #D4A017 100%);
  opacity:0; transition:opacity 0.35s ease; z-index:0;
  animation: borderSpin 2.5s linear infinite;
}
.pcard-wrap:hover::before { opacity:1; }
@keyframes borderSpin {
  0%   { background: conic-gradient(from 0deg,   #D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017); }
  25%  { background: conic-gradient(from 90deg,  #D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017); }
  50%  { background: conic-gradient(from 180deg, #D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017); }
  75%  { background: conic-gradient(from 270deg, #D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017); }
  100% { background: conic-gradient(from 360deg, #D4A017,#FF8F00,#D4A017,#FF6B00,#D4A017); }
}
.pcard-wrap::after {
  content:''; position:absolute; inset:-16px; border-radius:28px;
  background:radial-gradient(circle,rgba(212,160,23,0.22) 0%,transparent 70%);
  opacity:0; transition:opacity 0.35s ease; z-index:-1;
  animation:auraBreath 2.8s ease-in-out infinite;
}
.pcard-wrap:hover::after { opacity:1; }
@keyframes auraBreath { 0%,100%{transform:scale(0.95);} 50%{transform:scale(1.05);} }

.pcard {
  position:relative; z-index:1; width:100%; border-radius:18px; overflow:hidden;
  background: linear-gradient(160deg, rgba(80,30,5,0.55) 0%, rgba(30,10,0,0.75) 60%, rgba(10,5,0,0.88) 100%);
  backdrop-filter:blur(20px);
  border:1.5px solid rgba(212,160,23,0.28);
  box-shadow: inset 0 1px 0 rgba(255,200,80,0.18), 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(212,160,23,0.07);
  transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
}
.pcard-wrap:hover .pcard {
  transform: translateY(-10px) scale(1.035);
  box-shadow: inset 0 1px 0 rgba(255,200,80,0.28), 0 22px 55px rgba(0,0,0,0.7), 0 0 55px rgba(212,160,23,0.22);
}
.pcard::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(110deg, transparent 30%, rgba(255,200,80,0.15) 50%, transparent 70%);
  transform:translateX(-100%); transition:transform 0s; z-index:2; pointer-events:none;
}
.pcard-wrap:hover .pcard::after { transform:translateX(100%); transition:transform 0.6s ease; }

.pcard-spotlight {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:75%; height:50px;
  background:radial-gradient(ellipse at 50% 0%, rgba(255,160,30,0.28) 0%, transparent 75%);
  z-index:1; pointer-events:none;
  animation: spotFlicker 3.5s ease-in-out infinite;
}
@keyframes spotFlicker { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

.pcard-medal {
  position:absolute; top:8px; left:10px; z-index:6;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,0.6));
  transition:transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
  width:clamp(36px,4.8vw,52px);
}
.pcard-wrap:hover .pcard-medal { transform:rotate(-12deg) scale(1.22); }

.pcard-body {
  padding:10px 12px 12px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  position:relative; z-index:3;
}

.pcard-platform {
  position:relative; width:clamp(88px,11.5vw,110px); height:clamp(88px,11.5vw,110px);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.pcard-platform::before,.pcard-platform::after {
  content:''; position:absolute; border-radius:50%;
  border:1.5px solid rgba(212,160,23,0.4); animation:ringPulse 2.5s ease-in-out infinite;
}
.pcard-platform::before { inset:0; }
.pcard-platform::after  { inset:13px; animation-delay:0.55s; }
.ring3 { position:absolute; inset:25px; border-radius:50%; border:1px solid rgba(212,160,23,0.22); animation:ringPulse 2.5s ease-in-out infinite 1.1s; }
.pcard-platform-inner { position:absolute; inset:28px; border-radius:50%; background:radial-gradient(circle, rgba(212,160,23,0.22) 0%, transparent 100%); animation:innerGlow 2.5s ease-in-out infinite; }
@keyframes innerGlow  { 0%,100%{opacity:0.5;transform:scale(0.94);} 50%{opacity:1;transform:scale(1.06);} }
@keyframes ringPulse  { 0%,100%{opacity:0.3;transform:scale(1);}   50%{opacity:1;transform:scale(1.07);} }

.pcard-img {
  width:clamp(72px,9.5vw,102px); height:clamp(72px,9.5vw,102px);
  object-fit:contain; filter:drop-shadow(0 6px 18px rgba(0,0,0,0.65));
  animation:floatUp 3.5s ease-in-out infinite; position:relative; z-index:4;
  transition:filter 0.3s ease, transform 0.3s ease;
}
.pcard-wrap:hover .pcard-img {
  filter:drop-shadow(0 8px 24px rgba(212,160,23,0.6)) drop-shadow(0 0 22px rgba(212,160,23,0.4));
  transform:scale(1.1) translateY(-5px);
}

.pcard-rank {
  font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:900;
  letter-spacing:2.5px; text-transform:uppercase;
  padding:2px 9px; border-radius:20px; color:var(--gold-lt);
  background:rgba(212,160,23,0.12); border:1px solid rgba(212,160,23,0.32);
  text-shadow:0 0 10px rgba(212,160,23,0.6);
}
.pcard-name {
  font-family:'Barlow Condensed',sans-serif; font-size:clamp(13px,1.9vw,17px);
  font-weight:900; color:#fff; text-align:center; line-height:1.15;
}
.pcard-sub { font-size:clamp(9px,1.1vw,11px); color:rgba(255,255,255,0.4); text-align:center; font-weight:700; margin-top:-3px; }
.pcard-qty {
  font-size:10px; font-weight:800; padding:2px 10px; border-radius:20px;
  color:var(--gold-lt); background:rgba(212,160,23,0.1); border:1px solid rgba(212,160,23,0.25);
  animation:qtyGlow 2.2s ease-in-out infinite;
}
@keyframes qtyGlow { 0%,100%{box-shadow:0 0 4px rgba(212,160,23,0.2);} 50%{box-shadow:0 0 14px rgba(212,160,23,0.6);} }

.pcard-hint {
  width:100%; padding:9px; border-radius:10px; border:none;
  font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900;
  letter-spacing:1.5px; text-transform:uppercase;
  background:linear-gradient(135deg,#D4A017,#FF6B00); color:#1a0500;
  box-shadow:0 4px 16px rgba(212,160,23,0.5); position:relative; overflow:hidden; text-align:center;
}
.pcard-hint::before {
  content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
  background:rgba(255,255,255,0.4); transform:skewX(-20deg);
  animation:sheen 3s ease-in-out infinite; z-index:1;
}
@keyframes sheen {
  0%,25%{left:-60%;opacity:0;} 27%{opacity:1;} 52%{left:130%;opacity:0;} 100%{left:130%;opacity:0;}
}

/* ═══ WHEEL ZONE ═══ */
#wheel-zone {
  display: none;
  position: absolute; inset: 0;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  z-index: 20;
}
#wheel-zone.active { display: flex; }

.wheel-halo {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.wheel-halo::before {
  content: '';
  position: absolute; inset: -22px; border-radius: 50%;
  background: radial-gradient(circle, rgba(212,160,23,0.22) 0%, transparent 70%);
  animation: haloBreath 2s ease-in-out infinite; z-index: 0;
}
@keyframes haloBreath { 0%,100%{transform:scale(0.95);opacity:0.7;} 50%{transform:scale(1.1);opacity:1;} }

.wheel-container {
  position: relative;
  width: clamp(210px,30vw,290px); height: clamp(210px,30vw,290px);
  cursor: pointer; z-index: 1;
}
.wheel-container canvas { display: block; border-radius: 50%; }

/* Triangle pointer */
.wheel-arrow {
  position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 30px solid #D4A017;
  filter: drop-shadow(0 3px 8px rgba(212,160,23,0.7)) drop-shadow(0 0 14px rgba(255,150,0,0.5));
  z-index: 10;
}

.wheel-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(12px, 1.8vw, 15px); font-weight: 900;
  color: rgba(255,210,100,0.7); letter-spacing: 3px; text-transform: uppercase;
  animation: pulse 1.5s ease-in-out infinite;
  text-shadow: 0 0 20px rgba(212,160,23,0.5);
}
@keyframes pulse { 0%,100%{opacity:0.45;} 50%{opacity:1;} }

/* ═══ REVEAL BUTTON ═══ */
#reveal-btn-wrap {
  display: none; position: fixed;
  bottom: 0; left: 0; right: 0; height: 50vh;
  align-items: center; justify-content: center;
  z-index: 100; pointer-events: none;
}
#reveal-btn-wrap.show { display: flex; }

#reveal-btn {
  pointer-events: all; display: block;
  padding: 18px 52px; border-radius: 60px; border: none;
  background: linear-gradient(135deg, #D4A017 0%, #FF6B00 40%, #C0000A 100%);
  color: #fff;
  font-family: 'Russo One', sans-serif;
  font-size: clamp(16px, 2.5vw, 24px);
  letter-spacing: 2px; cursor: pointer;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(212,120,0,0.6), 0 0 60px rgba(212,160,23,0.25);
  animation: revealPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both, revealGlow 2.4s ease-in-out 0.5s infinite;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
@keyframes revealPop {
  0%   { transform: scale(0.5) translateY(40px); opacity: 0; }
  70%  { transform: scale(1.08) translateY(-6px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
@keyframes revealGlow {
  0%,100% { box-shadow: 0 0 0 4px rgba(212,160,23,0.15), 0 8px 32px rgba(212,100,0,0.55), 0 0 60px rgba(212,160,23,0.2); }
  50%      { box-shadow: 0 0 0 14px rgba(212,160,23,0.08), 0 12px 55px rgba(212,100,0,0.8), 0 0 100px rgba(212,160,23,0.45); }
}
#reveal-btn:hover {
  transform: translateY(-6px) scale(1.06);
  box-shadow: 0 0 0 8px rgba(212,160,23,0.15), 0 18px 60px rgba(212,80,0,0.75), 0 0 120px rgba(212,160,23,0.5);
}
#reveal-btn::before {
  content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
  background:rgba(255,255,255,0.28); transform:skewX(-22deg);
  animation: sheen 3.5s ease-in-out infinite;
}

/* ═══ MODAL ═══ */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 500;
  align-items: center; justify-content: center;
  padding: 16px;
}
#modal-overlay.open { display: flex; }

.modal {
  position: relative;
  background: linear-gradient(145deg, rgba(40,12,0,0.98) 0%, rgba(20,6,0,0.99) 60%, rgba(35,10,0,0.98) 100%);
  border: 1.5px solid rgba(212,160,23,0.35);
  border-radius: 28px;
  padding: 28px 24px 22px;
  width: min(96vw, 740px);
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,200,80,0.1), 0 0 60px rgba(212,160,23,0.08);
  animation: modalIn 0.5s cubic-bezier(0.34,1.4,0.64,1);
}
.modal::before {
  content: ''; position: absolute; top: 0; left: -60%; right: -60%; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(212,160,23,0.6) 35%, rgba(255,220,100,0.9) 50%, rgba(212,160,23,0.6) 65%, transparent 100%);
  animation: topEdgeSheen 4s ease-in-out infinite;
}
@keyframes topEdgeSheen { 0%,100%{opacity:0.3;transform:scaleX(0.6);} 50%{opacity:1;transform:scaleX(1);} }
.modal::after {
  content: ''; position: absolute; top: -80px; right: -80px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(212,160,23,0.1) 0%, transparent 70%);
  pointer-events: none;
  animation: cornerGlow 3s ease-in-out 1s infinite;
}
@keyframes cornerGlow { 0%,100%{opacity:0.5;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.2);} }
@keyframes modalIn {
  0%  { transform: scale(0.8) translateY(60px); opacity: 0; }
  70% { transform: scale(1.02) translateY(-4px); opacity: 1; }
  100%{ transform: scale(1) translateY(0); opacity: 1; }
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; position: relative;
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
  font-size: clamp(18px, 2.8vw, 26px);
  background: linear-gradient(135deg, #FFD966, #D4A017, #FF6B00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 1.5px;
  filter: drop-shadow(0 0 12px rgba(212,160,23,0.4));
}
.modal-close {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1.5px solid rgba(212,160,23,0.35);
  background: rgba(212,160,23,0.07);
  color: rgba(212,160,23,0.8);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  line-height: 1;
}
.modal-close:hover {
  background: rgba(212,160,23,0.18); border-color: rgba(212,160,23,0.7); color: var(--gold-lt);
  transform: scale(1.15) rotate(90deg); box-shadow: 0 0 20px rgba(212,160,23,0.3);
}

/* ── Winners Table ── */
.winners-table { width: 100%; border-collapse: separate; border-spacing: 0 7px; }
.winners-table thead th {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
  font-size: clamp(10px, 1.5vw, 13px); letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(212,160,23,0.65); padding: 6px 12px 10px; text-align: left;
  border-bottom: 1px solid rgba(212,160,23,0.15);
}
.winners-table tbody tr {
  background: rgba(255,255,255,0.03); cursor: pointer;
  transition: transform 0.32s cubic-bezier(0.34,1.28,0.64,1), box-shadow 0.32s ease, background 0.32s ease;
  animation: rowIn 0.45s cubic-bezier(0.34,1.2,0.64,1) both;
}
.winners-table tbody tr:nth-child(1){animation-delay:0.05s;}
.winners-table tbody tr:nth-child(2){animation-delay:0.12s;}
.winners-table tbody tr:nth-child(3){animation-delay:0.19s;}
.winners-table tbody tr:nth-child(4){animation-delay:0.26s;}
.winners-table tbody tr:nth-child(5){animation-delay:0.33s;}
@keyframes rowIn {
  0%  { opacity:0; transform:translateY(20px) scale(0.97); }
  60% { opacity:1; transform:translateY(-3px) scale(1.005); }
  100%{ opacity:1; transform:translateY(0) scale(1); }
}
.winners-table tbody tr:hover {
  background: linear-gradient(100deg, rgba(212,160,23,0.08) 0%, rgba(255,100,0,0.04) 50%, rgba(212,160,23,0.03) 100%);
  transform: translateY(-3px) scale(1.008);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 3px 0 0 rgba(212,160,23,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
}
.winners-table tbody tr td:first-child { position: relative; }
.winners-table tbody tr td:first-child::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 0; border-radius: 2px;
  background: linear-gradient(180deg, #D4A017, #FF6B00);
  transition: width 0.28s ease; box-shadow: 0 0 10px rgba(212,160,23,0.6);
}
.winners-table tbody tr:hover td:first-child::before { width: 3px; }

.winners-table tbody tr.winner-highlight {
  background: linear-gradient(100deg, rgba(212,160,23,0.14) 0%, rgba(255,100,0,0.07) 60%, rgba(212,160,23,0.04) 100%);
  box-shadow: 0 0 0 1px rgba(212,160,23,0.3), 0 6px 24px rgba(212,160,23,0.12), inset 0 1px 0 rgba(212,160,23,0.18);
  animation: rowIn 0.45s cubic-bezier(0.34,1.2,0.64,1) 0.05s both, hlPulse 3s ease-in-out 0.8s infinite;
}
@keyframes hlPulse {
  0%,100%{ box-shadow:0 0 0 1px rgba(212,160,23,0.25),0 6px 24px rgba(212,160,23,0.08),inset 0 1px 0 rgba(212,160,23,0.12); }
  50%    { box-shadow:0 0 0 1.5px rgba(212,160,23,0.6),0 10px 36px rgba(212,160,23,0.25),inset 0 1px 0 rgba(255,255,255,0.12); }
}
.winners-table tbody tr.winner-highlight:hover {
  transform: translateY(-4px) scale(1.012);
  box-shadow: 0 0 0 1.5px rgba(212,160,23,0.65), 0 14px 44px rgba(212,160,23,0.28), inset 3px 0 0 #D4A017;
}
.winners-table tbody td {
  padding: 13px 12px; font-size: clamp(12px,1.65vw,15px); color: rgba(255,255,255,0.82);
  vertical-align: middle; border-top: 1px solid rgba(255,255,255,0.04); border-bottom: 1px solid rgba(0,0,0,0.12);
  transition: color 0.28s ease;
}
.winners-table tbody td:first-child  { border-radius:14px 0 0 14px; border-left:1px solid rgba(255,255,255,0.04); overflow:hidden; }
.winners-table tbody td:last-child   { border-radius:0 14px 14px 0; border-right:1px solid rgba(255,255,255,0.04); }
.winners-table tbody tr:hover td { color: rgba(255,255,255,0.95); }

.row-num {
  width:34px; height:34px; border-radius:50%;
  background:rgba(212,160,23,0.1); border:1.5px solid rgba(212,160,23,0.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900; color:rgba(212,160,23,0.8);
  transition: all 0.28s ease;
}
.winners-table tbody tr:hover .row-num { background:rgba(212,160,23,0.2); border-color:rgba(212,160,23,0.7); color:var(--gold-lt); box-shadow:0 0 14px rgba(212,160,23,0.4); transform:scale(1.12); }
.winner-highlight .row-num { background:linear-gradient(135deg,#D4A017,#FF6B00); border-color:var(--gold-lt); color:#1a0500; box-shadow:0 0 16px rgba(212,160,23,0.5); }

.winner-name { font-family:'Barlow Condensed',sans-serif; font-size:clamp(14px,2vw,18px); font-weight:900; color:rgba(255,255,255,0.92); transition:color 0.28s ease; }
.winners-table tbody tr:hover .winner-name { color:#fff; }
.winner-highlight .winner-name { color:#FFD966; }
.winner-mobile, .winner-district { font-weight:700; color:rgba(255,255,255,0.5); font-size:clamp(11px,1.5vw,13px); font-family:'Nunito',sans-serif; transition:color 0.28s ease; }
.winner-state { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:clamp(12px,1.6vw,15px); letter-spacing:0.8px; color:rgba(212,160,23,0.75); transition:color 0.28s ease; }
.winners-table tbody tr:hover .winner-mobile,
.winners-table tbody tr:hover .winner-district { color:rgba(255,255,255,0.75); }
.winners-table tbody tr:hover .winner-state { color:var(--gold-lt); }

/* Pagination */
.pagination { display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:12px; }
.page-info { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; color:rgba(255,255,255,0.3); letter-spacing:2.5px; text-align:center; flex:1; }
.page-btn {
  padding:9px 24px; border-radius:50px;
  border:1.5px solid rgba(212,160,23,0.3); background:rgba(212,160,23,0.05);
  color:rgba(212,160,23,0.7);
  font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; letter-spacing:1.5px; cursor:pointer;
  position:relative; overflow:hidden;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease, background 0.28s ease, border-color 0.28s ease, color 0.28s ease;
}
.page-btn::before {
  content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
  background:linear-gradient(110deg,transparent,rgba(255,255,255,0.16),transparent); transition:left 0s;
}
.page-btn:hover:not(:disabled)::before { left:160%; transition:left 0.45s ease; }
.page-btn:hover:not(:disabled) {
  background:rgba(212,160,23,0.14); border-color:rgba(212,160,23,0.65); color:var(--gold-lt);
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 6px 24px rgba(212,160,23,0.22),inset 0 1px 0 rgba(255,255,255,0.1);
}
.page-btn:disabled { opacity:0.2; cursor:not-allowed; }

/* ═══ CELEBRATION PARTICLES ═══ */
.cel-p {
  position:fixed; pointer-events:none; z-index:9999;
  animation: celFly var(--dur,1.2s) ease-out var(--delay,0s) both;
}
@keyframes celFly {
  0%  { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
  80% { opacity:1; }
  100%{ transform:translate(var(--dx),var(--dy)) rotate(var(--rot,360deg)) scale(0.2); opacity:0; }
}
.cel-spark {
  position:fixed; pointer-events:none; z-index:9999; width:3px; border-radius:2px;
  transform-origin:bottom center;
  animation: sparkShoot var(--dur,0.7s) ease-out var(--delay,0s) both;
}
@keyframes sparkShoot {
  0%  { transform:translate(0,0) scaleY(1) rotate(var(--ang,0deg)); opacity:1; }
  100%{ transform:translate(var(--dx),var(--dy)) scaleY(0.1) rotate(var(--ang,0deg)); opacity:0; }
}
.cel-ring {
  position:fixed; pointer-events:none; z-index:9998; border-radius:50%; border:3px solid;
  animation: ringShock var(--dur,0.8s) ease-out var(--delay,0s) both;
}
@keyframes ringShock {
  0%  { transform:translate(-50%,-50%) scale(0); opacity:0.9; }
  100%{ transform:translate(-50%,-50%) scale(1); opacity:0; }
}
</style>

<script>
/* ══════════════════════════════════════
   PRIZE DATA — Shriram Bioseed
══════════════════════════════════════ */
const GH = 'https://raw.githubusercontent.com/projectquicksilver/Shriram_Bioseed-Lucky-Draw/main/';

const prizes = {
  0: {
    badge:   GH + 'Mega_Prize.png',
    product: GH + 'Mega_Prize.png',
    rank:    '🏆 MEGA PRIZE',
    name:    '2 BULLET MOTORCYCLES',
    sub:     'Royal Enfield Classic',
    cRank:   '🏆 Mega Prize',
    cName:   'BULLET<br>MOTORCYCLES',
    cSub:    'Royal Enfield Classic 350',
    qty:     '🎁 × 2 Winners',
    csv:     'winners_mega.csv',
    discId:  'pod-disc-mega'
  },
  1: {
    badge:   GH + '1st_prize.png',
    product: GH + '1st_prize.png',
    rank:    '🥇 1ST PRIZE',
    name:    '2 ACTIVA SCOOTERS',
    sub:     'Honda Activa 6G',
    cRank:   '⭐ 1st Prize',
    cName:   'ACTIVA<br>SCOOTERS',
    cSub:    'Honda Activa 6G',
    qty:     '🎁 × 2 Winners',
    csv:     'winners_1st.csv',
    discId:  null
  },
  2: {
    badge:   GH + '2nd_Prize.png',
    product: GH + '2nd_Prize.png',
    rank:    '🥈 2ND PRIZE',
    name:    '4 SMART TVs',
    sub:     '43" Android Smart TV',
    cRank:   '🥈 2nd Prize',
    cName:   'SMART<br>TVs',
    cSub:    '43" Android Smart TV',
    qty:     '🎁 × 4 Winners',
    csv:     'winners_2nd.csv',
    discId:  'pod-disc-rank2'
  },
  3: {
    badge:   GH + '3rd_Prize.png',
    product: GH + '3rd_Prize.png',
    rank:    '🥉 3RD PRIZE',
    name:    '10 SPRAY MACHINES',
    sub:     '16L Battery Sprayer',
    cRank:   '🥉 3rd Prize',
    cName:   'SPRAY<br>MACHINES',
    cSub:    '16L Battery Sprayer',
    qty:     '🎁 × 10 Winners',
    csv:     'winners_3rd.csv',
    discId:  'pod-disc-rank3'
  },
  4: {
    badge:   GH + 'Consolation_Prize.png',
    product: GH + 'Consolation_Prize.png',
    rank:    '🎁 CONSOLATION PRIZE',
    name:    '100 INDUCTION COOKTOPS',
    sub:     '2000W Smart Cooktop',
    cRank:   '🎁 Consolation',
    cName:   'INDUCTION<br>COOKTOPS',
    cSub:    '2000W Smart Cooktop',
    qty:     '🎁 × 100 Winners',
    csv:     'winners_consolation.csv',
    discId:  'pod-disc-rankc'
  }
};

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
const params  = new URLSearchParams(location.search);
const prizeId = parseInt(params.get('prize'));
const prize   = prizes[prizeId] || prizes[1];

// Podium
document.getElementById('pod-badge').src   = prize.badge;
document.getElementById('pod-product').src = prize.product;
document.getElementById('pod-rank-label').textContent = prize.rank;
document.getElementById('pod-name').textContent       = prize.name;
document.getElementById('pod-sub').textContent        = prize.sub;
if (prize.discId) {
  document.getElementById('pod-disc').id = prize.discId;
}

// Card
document.getElementById('card-medal').src          = prize.badge;
document.getElementById('card-img').src            = prize.product;
document.getElementById('card-rank-label').textContent = prize.cRank;
document.getElementById('card-name').innerHTML     = prize.cName;
document.getElementById('card-sub').textContent    = prize.cSub;
document.getElementById('card-qty').textContent    = prize.qty;

// Modal title
document.getElementById('modal-title').textContent = `🏆 ${prize.rank} — Winners`;

/* FX */
(function(){
  const layer = document.getElementById('fx');
  const colors = ['#D4A017','#FFD966','#FF6B00','#FF3B3B','#FFF5DC','#B87333','#FF9060'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div'); el.className='cf';
    const c=colors[i%colors.length],w=4+Math.random()*9,h=w*(Math.random()>.4?2.5:1);
    el.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${c};border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*11}s;animation-duration:${7+Math.random()*9}s;`;
    layer.appendChild(el);
  }
  for(let i=0;i<18;i++){
    const s=document.createElement('div'); s.className='sp';
    const sz=3+Math.random()*9;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*95}%;width:${sz}px;height:${sz}px;animation-delay:${Math.random()*4}s;animation-duration:${1.5+Math.random()*3}s;`;
    layer.appendChild(s);
  }
})();

/* ══════════════════════════════════════
   CARD CLICK → SHOW WHEEL
══════════════════════════════════════ */
document.getElementById('card-wrap').addEventListener('click', function(){
  this.style.display='none';
  document.getElementById('wheel-zone').classList.add('active');
  document.getElementById('div-label').textContent='✦ Click Wheel to Spin ✦';
  initWheel();
});

/* ══════════════════════════════════════
   WHEEL
══════════════════════════════════════ */
let wheelSpinning=false, wheelAngle=0, wheelDrawn=false;

/* Bioseed-themed wheel segments */
const SEGS = [
  { color:'#C0000A', emoji:'🏆' },
  { color:'#D4A017', emoji:'⭐' },
  { color:'#3B1200', emoji:'🎁' },
  { color:'#7B2A00', emoji:'🎯' },
  { color:'#5A1A00', emoji:'💎' },
  { color:'#FF6B00', emoji:'🌟' },
  { color:'#8B0000', emoji:'🎊' },
  { color:'#B87333', emoji:'🏅' },
];
const NUM_SEGS=SEGS.length;
let emojiImages=[];

function preloadEmojis(callback){
  emojiImages=[];
  let done=0;
  SEGS.forEach((seg,i)=>{
    const off=document.createElement('canvas');
    off.width=off.height=40;
    const c=off.getContext('2d');
    c.font='31px serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText(seg.emoji,20,20);
    const img=new Image();
    img.onload=()=>{ emojiImages[i]=img; done++; if(done===SEGS.length) callback(); };
    img.src=off.toDataURL();
  });
}

function initWheel(){
  if(wheelDrawn) return;
  wheelDrawn=true;
  preloadEmojis(()=>{
    const canvas=document.getElementById('wheel-canvas');
    const SIZE=Math.min(document.querySelector('.wheel-container').offsetWidth,290);
    canvas.width=SIZE; canvas.height=SIZE;
    drawWheel(canvas,wheelAngle);
  });
  document.getElementById('wheel-container').addEventListener('click',spinWheel);
}

function drawWheel(canvas,angle){
  const ctx=canvas.getContext('2d');
  const S=canvas.width, cx=S/2, cy=S/2, R=S/2-8;
  const ARC=(Math.PI*2)/NUM_SEGS;
  ctx.clearRect(0,0,S,S);

  /* Outer gold glow ring */
  ctx.save();
  ctx.shadowColor='rgba(212,160,23,0.9)'; ctx.shadowBlur=28;
  ctx.beginPath(); ctx.arc(cx,cy,R+6,0,Math.PI*2);
  ctx.strokeStyle='#D4A017'; ctx.lineWidth=6; ctx.stroke();
  ctx.restore();

  /* Segments */
  for(let i=0;i<NUM_SEGS;i++){
    const start=angle+i*ARC-Math.PI/2, end=start+ARC;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,start,end); ctx.closePath();

    /* Subtle radial gradient per segment */
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    grd.addColorStop(0, lighten(SEGS[i].color,40));
    grd.addColorStop(1, SEGS[i].color);
    ctx.fillStyle=grd; ctx.fill();

    /* Divider */
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(start)*R, cy+Math.sin(start)*R);
    ctx.strokeStyle='rgba(255,220,100,0.6)'; ctx.lineWidth=2.5; ctx.stroke();
  }

  /* Outer border */
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,210,80,0.85)'; ctx.lineWidth=4; ctx.stroke();

  /* Emoji icons */
  const iconDist=R*0.62, iconSize=R*0.28;
  for(let i=0;i<NUM_SEGS;i++){
    const midA=angle+i*ARC-Math.PI/2+ARC/2;
    const ix=cx+Math.cos(midA)*iconDist, iy=cy+Math.sin(midA)*iconDist;
    if(emojiImages[i]){
      ctx.drawImage(emojiImages[i],ix-iconSize/2,iy-iconSize/2,iconSize,iconSize);
    } else {
      ctx.save(); ctx.font=(iconSize*0.85)+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(SEGS[i].emoji,ix,iy); ctx.restore();
    }
  }

  /* Center hub */
  const hubR=R*0.20;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(cx,cy,hubR,0,Math.PI*2);
  const hub=ctx.createRadialGradient(cx-hubR*0.2,cy-hubR*0.2,0,cx,cy,hubR);
  hub.addColorStop(0,'#fff8e0'); hub.addColorStop(1,'#D4A017');
  ctx.fillStyle=hub; ctx.fill(); ctx.restore();
  ctx.beginPath(); ctx.arc(cx,cy,hubR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.save();
  ctx.font=`900 ${Math.round(hubR*0.5)}px 'Barlow Condensed',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#3B1200'; ctx.fillText('SPIN',cx,cy);
  ctx.restore();
}

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&0xff)+amt);
  const g=Math.min(255,((n>>8)&0xff)+amt);
  const b=Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

function spinWheel(){
  if(wheelSpinning) return;
  wheelSpinning=true;
  document.getElementById('wheel-label').textContent='✦ SPINNING... ✦';
  const canvas=document.getElementById('wheel-canvas');
  const totalRotation=(Math.PI*2)*(5+Math.random()*4);
  const duration=4500, start=performance.now(), startAngle=wheelAngle;
  function easeOut(t){ return 1-Math.pow(1-t,3); }
  function animate(now){
    const elapsed=Math.min(now-start,duration), t=elapsed/duration;
    wheelAngle=startAngle+totalRotation*easeOut(t);
    drawWheel(canvas,wheelAngle);
    if(elapsed<duration){ requestAnimationFrame(animate); }
    else { wheelSpinning=false; onSpinEnd(); }
  }
  requestAnimationFrame(animate);
}

function onSpinEnd(){
  document.getElementById('wheel-label').textContent='🎉 SPIN COMPLETE!';
  const wc=document.getElementById('wheel-container');
  const rect=wc.getBoundingClientRect();
  const ox=rect.left+rect.width/2, oy=rect.top+rect.height/2;
  const COLS=['#D4A017','#FF6B00','#FFD966','#C0000A','#FF3B3B','#fff','#FFE082','#B87333','#FF9060','#FFFFFF'];

  /* Ring shockwaves */
  [0,120,240].forEach((delay,ri)=>{
    const ring=document.createElement('div'); ring.className='cel-ring';
    const size=60+ri*30;
    ring.style.cssText=`left:${ox}px;top:${oy}px;width:${size}px;height:${size}px;border-color:${['#D4A017','#FF6B00','#fff'][ri]};--delay:${delay}ms;--dur:0.9s;`;
    document.body.appendChild(ring);
    setTimeout(()=>ring.remove(),1200+delay);
  });

  /* Spark streaks */
  for(let i=0;i<24;i++){
    const spark=document.createElement('div'); spark.className='cel-spark';
    const angle=(i/24)*Math.PI*2, dist=80+Math.random()*140, len=12+Math.random()*28, delay=Math.random()*180;
    spark.style.cssText=`left:${ox}px;top:${oy}px;height:${len}px;background:${COLS[i%COLS.length]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;--ang:${angle*180/Math.PI+90}deg;--dur:${0.5+Math.random()*0.5}s;--delay:${delay}ms;`;
    document.body.appendChild(spark);
    setTimeout(()=>spark.remove(),1000+delay);
  }

  /* Confetti burst */
  for(let i=0;i<65;i++){
    const p=document.createElement('div'); p.className='cel-p';
    const angle=(i/65)*Math.PI*2+(Math.random()-0.5)*0.5;
    const dist=100+Math.random()*230, sz=5+Math.random()*10;
    const isRect=Math.random()>0.45, delay=Math.random()*250, rot=(Math.random()-0.5)*720;
    p.style.cssText=`left:${ox-sz/2}px;top:${oy-sz/2}px;width:${sz}px;height:${isRect?sz*2.5:sz}px;border-radius:${isRect?'2px':'50%'};background:${COLS[i%COLS.length]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;--rot:${rot}deg;--dur:${0.8+Math.random()*0.7}s;--delay:${delay}ms;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1600+delay);
  }

  /* Falling confetti wave */
  setTimeout(()=>{
    for(let i=0;i<40;i++){
      const p=document.createElement('div'); p.className='cel-p';
      const sx=Math.random()*window.innerWidth, dist=window.innerHeight*0.6+Math.random()*window.innerHeight*0.3;
      const sz=5+Math.random()*9, delay=Math.random()*600, rot=(Math.random()-0.5)*540;
      p.style.cssText=`left:${sx}px;top:-10px;width:${sz}px;height:${Math.random()>0.5?sz*2.5:sz}px;border-radius:${Math.random()>0.5?'50%':'2px'};background:${COLS[Math.floor(Math.random()*COLS.length)]};--dx:${(Math.random()-0.5)*120}px;--dy:${dist}px;--rot:${rot}deg;--dur:${1.2+Math.random()*0.8}s;--delay:${delay}ms;`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),2200+delay);
    }
  },300);

  /* Fade wheel → show reveal button */
  setTimeout(()=>{
    const wz=document.getElementById('wheel-zone');
    wz.style.transition='opacity 0.6s'; wz.style.opacity='0';
    setTimeout(()=>{
      wz.classList.remove('active'); wz.style.opacity=''; wz.style.transition='';
      document.getElementById('reveal-btn-wrap').classList.add('show');
      document.getElementById('div-label').textContent='✦ Winners Revealed! ✦';
    },600);
  },900);
}

/* ══════════════════════════════════════
   CSV / MODAL
══════════════════════════════════════ */
const PAGE_SIZE=5;
let allWinners=[], currentPage=1;

async function openModal(){
  try {
    const res=await fetch(prize.csv);
    const text=await res.text();
    allWinners=parseCSV(text);
  } catch(e){
    allWinners=getDemoWinners();
  }
  currentPage=1; renderPage();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  return lines.slice(1).map(line=>{
    const cols=line.match(/(".*?"|[^,]+)(?=,|$)/g)||line.split(',');
    return {
      name:    (cols[0]||'').replace(/"/g,'').trim(),
      mobile:  (cols[1]||'').replace(/"/g,'').trim(),
      district:(cols[2]||'').replace(/"/g,'').trim(),
      state:   (cols[3]||'').replace(/"/g,'').trim()
    };
  }).filter(r=>r.name);
}

function getDemoWinners(){

    {name:'Ramesh Kumar',   mobile:'9876543210',district:'Nashik',     state:'Maharashtra'},
    {name:'Suresh Patel',   mobile:'8765432109',district:'Ahmedabad',  state:'Gujarat'},

    {name:'Sunita Yadav',   mobile:'7766554433',district:'Bhopal',     state:'Madhya Pradesh'},
    {name:'Ajay Singh',     mobile:'6655443322',district:'Chandigarh', state:'Punjab'},
    {name:'Meena Kumari',   mobile:'9543216789',district:'Mysuru',     state:'Karnataka'},
    {name:'Dinesh Gowda',   mobile:'8432107698',district:'Pune',       state:'Maharashtra'}
  ];
}

function renderPage(){
  const start=(currentPage-1)*PAGE_SIZE;
  const pageData=allWinners.slice(start,start+PAGE_SIZE);
  const totalPages=Math.ceil(allWinners.length/PAGE_SIZE)||1;
  const tbody=document.getElementById('winners-tbody');
  tbody.innerHTML='';
  pageData.forEach((w,i)=>{
    const isFirst=(i===0);
    const tr=document.createElement('tr');
    if(isFirst) tr.classList.add('winner-highlight');
    tr.innerHTML=`
      <td><div class="row-num">${start+i+1}</div></td>
      <td><div class="winner-name">${isFirst?'🏆 ':''}${w.name}</div></td>
      <td><div class="winner-mobile">${w.mobile}</div></td>
      <td><div class="winner-district">${w.district}</div></td>
      <td><div class="winner-state">${w.state}</div></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('page-info').textContent=`Page ${currentPage} of ${totalPages}`;
  document.getElementById('prev-btn').disabled=currentPage===1;
  document.getElementById('next-btn').disabled=currentPage===totalPages;
}

function changePage(dir){
  const totalPages=Math.ceil(allWinners.length/PAGE_SIZE)||1;
  currentPage=Math.max(1,Math.min(totalPages,currentPage+dir));
  renderPage();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
